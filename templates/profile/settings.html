{% extends "layouts/dashboard_layout.html" %}

{% block title %}
Settings
{% endblock %}

{% block page_title %}
Settings
{% endblock %}

{% block content %}

<div class="dashboard-page">

    <div class="page-header">

        <div>

            <h1 class="page-title">
                Workspace Settings
            </h1>

            <p class="page-description">
                Update your account preferences and platform configuration.
            </p>

        </div>

    </div>

    <div class="glass-card settings-card">

        <form class="settings-form">

            <div class="form-group">

                <label>
                    Display Name
                </label>

                <input
                type="text"
                class="input"
                value="{{ display_name(current_user.username) }}">

            </div>

            <div class="form-group">

                <label>
                    Email Address
                </label>

                <input
                type="email"
                class="input"
                value="{{ current_user.email }}">

            </div>

            <div class="form-group">

                <label>
                    Workspace Theme
                </label>

                <select class="input">

                    <option>
                        Dark
                    </option>

                    <option>
                        Light
                    </option>

                </select>

            </div>

            <button
            type="submit"
            class="auth-submit-btn">

                Save Settings

            </button>

        </form>

    </div>

</div>

{% endblock %}
