<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}
        Dashboard
        {% endblock %}
    </title>

    <!-- CSS -->

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/variables.css') }}">

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/base.css') }}">

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/layout.css') }}">

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/components.css') }}">

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/utilities.css') }}">

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/animations.css') }}">

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/responsive.css') }}">

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/auth.css') }}">

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/alerts.css') }}">

    <!-- FONT -->

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- ICONS -->

    <script src="https://unpkg.com/lucide@latest"></script>

    {% block extra_css %}
    {% endblock %}

    <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">

</head>

<body class="{% block body_class %}{% endblock %}">

    <!-- GLOBAL TOASTS -->

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}

            <div class="global-toast-wrapper">

                {% for category, message in messages %}

                    <div
                        class="auth-alert flash-message flash-{{ category }}">

                        {{ message }}

                    </div>

                {% endfor %}

            </div>

        {% endif %}
    {% endwith %}

    <!-- PAGE CONTENT -->

    {% block content %}
    {% endblock %}

    <!-- CORE JS -->

    <script
        src="{{ url_for('static', filename='js/theme.js') }}">
    </script>

    <script
        src="{{ url_for('static', filename='js/dropdowns.js') }}">
    </script>

    <script
        src="{{ url_for('static', filename='js/modals.js') }}">
    </script>

    <script
        src="{{ url_for('static', filename='js/toasts.js') }}">
    </script>

    <script
        src="{{ url_for('static', filename='js/sidebar.js') }}">
    </script>

    <script
        src="{{ url_for('static', filename='js/animations.js') }}">
    </script>

    <script
        src="{{ url_for('static', filename='js/security.js') }}">
    </script>

    <script>

        if(window.lucide){

            lucide.createIcons();

        }

    </script>

    {% block extra_js %}
    {% endblock %}

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>

window.socket = io({

    transports: ["websocket", "polling"],

    reconnection: true
});

</script>

<link
rel="stylesheet"
href="{{ url_for('static', filename='css/chat.css') }}">

<script>

const CURRENT_USER_ID =
{{ current_user.id if current_user.is_authenticated else "null" }};

</script>

<script
src="{{ url_for('static', filename='js/chat.js') }}">
</script>

</body>

</html>
