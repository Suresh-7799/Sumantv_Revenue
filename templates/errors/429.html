{% extends "layouts/base.html" %}

{% block title %}
Too Many Requests
{% endblock %}

{% block body_class %}
auth-page
{% endblock %}

{% block content %}

<div class="auth-shell">

    <div class="glass-panel otp-panel">

        <div class="auth-panel-inner">

            <h1
            style="
            font-size:72px;
            margin-bottom:10px;
            ">
                429
            </h1>

            <h2>
                Too Many Requests
            </h2>

            <p
            style="
            margin-top:10px;
            margin-bottom:30px;
            opacity:0.8;
            ">

                Please wait a moment before trying again.

            </p>

            <a
            href="{{ url_for('auth.login') }}"
            class="auth-submit-btn"
            style="
            text-decoration:none;
            display:flex;
            align-items:center;
            justify-content:center;
            ">

                Back To Login

            </a>

        </div>

    </div>

</div>

{% endblock %}
