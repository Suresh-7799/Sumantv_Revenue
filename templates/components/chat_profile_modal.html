<div
class="chat-profile-modal"
id="chatProfileModal"
role="dialog"
aria-modal="true"
aria-labelledby="chatProfileFullName">

    <div class="chat-profile-card">

        <button
        type="button"
        class="chat-profile-close"
        id="closeChatProfile"
        aria-label="Close profile">

            ✕

        </button>

        <!-- =========================
             BANNER
        ========================== -->

        <div
        class="chat-profile-banner">

            <img
            id="chatProfileBanner"
            src="#"
            alt="Profile Banner"
            loading="lazy"
            draggable="false">
        </div>

        <!-- =========================
             AVATAR
        ========================== -->

        <div
        class="chat-profile-avatar">

            <img
            id="chatProfileAvatar"
            src="#"
            alt="Profile Avatar"
            loading="lazy"
            draggable="false">

        </div>

        <!-- =========================
             BODY
        ========================== -->

        <div class="chat-profile-body">

            <!-- =========================
                 USER NAME
            ========================== -->

            <div class="chat-profile-info">

                <h2
                id="chatProfileFullName">

                    User

                </h2>

                <!-- =========================
                     PROFILE GRID
                ========================== -->

                <div class="chat-profile-grid">

                    <!-- FIRST NAME -->

                    <div
                    class="chat-profile-item">

                        <span>

                            First Name

                        </span>

                        <strong
                        id="chatProfileFirstName">

                            —

                        </strong>

                    </div>

                    <!-- LAST NAME -->

                    <div
                    class="chat-profile-item">

                        <span>

                            Last Name

                        </span>

                        <strong
                        id="chatProfileLastName">

                            —

                        </strong>

                    </div>

                    <!-- EMAIL -->

                    <div
                    class="chat-profile-item">

                        <span>

                            Email

                        </span>

                        <strong
                        id="chatProfileEmail">

                            —

                        </strong>

                    </div>

                    <!-- EMPLOYEE ID -->

                    <div
                    class="chat-profile-item">

                        <span>

                            Employee ID

                        </span>

                        <strong
                        id="chatProfileEmployeeId">

                            —

                        </strong>

                    </div>

                    <!-- ROLE -->

                    <div
                    class="chat-profile-item">

                        <span>

                            Role

                        </span>

                        <strong
                        id="chatProfileRole">

                            —

                        </strong>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>
