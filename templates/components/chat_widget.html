<div class="chat-fab" id="chatFab">

    <i data-lucide="message-circle"></i>

</div>

<div
class="chat-drawer"
id="chatDrawer"
role="dialog"
aria-modal="true"
aria-labelledby="chatDrawerTitle">

    <!-- =========================
         HEADER
    ========================== -->

    <div class="chat-header">

        <h3 id="chatDrawerTitle">

            Team Chat

        </h3>

        <button
        type="button"
        id="closeChatDrawer"
        aria-label="Close Chat">

            <i data-lucide="x"></i>

        </button>

    </div>

    <!-- =========================
         SEARCH
    ========================== -->

    <div class="chat-search-wrapper">

        <input
        type="text"
        id="chatUserSearch"
        placeholder="Search teammates..."
        autocomplete="off"
        spellcheck="false">

    </div>

    <!-- =========================
         USERS LIST
    ========================== -->

    <div class="chat-users" id="chatUsers">

        {% for user in users %}

            <div
            class="chat-user-item"

            data-user-id="{{ user.id }}"

            data-name="{{ user.display_name or user.username }}"

            data-avatar="{{ user.profile_image or url_for('static', filename='default-avatar.png') }}">

                <!-- USER AVATAR -->

                <div class="chat-user-avatar">

                    {% if user.profile_image %}

                        <img
                        src="{{ user.profile_image }}"
                        alt="User Avatar"
                        loading="lazy"
                        draggable="false">

                    {% else %}

                        {{ (user.display_name or user.username)[0] }}

                    {% endif %}

                </div>

                <!-- USER INFO -->

                <div class="chat-user-info">

                    <strong>

                        {{ user.display_name or user.username }}

                    </strong>

                    <span>

                        {{ user.role.name if user.role else "Employee" }}

                    </span>

                </div>

            </div>

        {% endfor %}

    </div>

    <!-- =========================
         CHAT CONVERSATION
    ========================== -->

    <div
    class="chat-conversation"
    id="chatConversation">

        <!-- =========================
             TOP BAR
        ========================== -->

        <div class="chat-header chat-conversation-header">

            <!-- LEFT -->

            <div class="chat-header-left">

                <button
                type="button"
                id="backToUsers"
                aria-label="Back">

                    <i data-lucide="arrow-left"></i>

                </button>

                <div class="chat-active-user">

                    <img
                    id="activeChatAvatar"
                    src="{{ url_for('static', filename='default-avatar.png') }}"
                    alt="Active User"
                    loading="lazy"
                    draggable="false">

                    <div>

                        <strong id="activeChatUser">

                            User

                        </strong>

                    </div>

                </div>

            </div>

            <!-- RIGHT -->

            <div class="chat-header-right">

                <button
                type="button"
                id="chatMenuBtn"
                aria-label="Chat Menu">

                    <i data-lucide="more-vertical"></i>

                </button>

                <!-- =========================
                     MENU DROPDOWN
                ========================== -->

                <div
                class="chat-menu-dropdown"
                id="chatMenuDropdown">

                    <button
                    type="button"
                    id="viewProfileBtn">

                        View Profile

                    </button>

                    <button
                    type="button"
                    id="addToGroupBtn">

                        Add To Group

                    </button>

                    <button
                    type="button"
                    id="clearChatBtn">

                        Clear Chat

                    </button>

                    <button
                    type="button"
                    id="archiveChatBtn">

                        Archive Chat

                    </button>

                    <button
                    type="button"
                    id="blockUserBtn">

                        Block User

                    </button>

                </div>

            </div>

        </div>

        <!-- =========================
             MESSAGES
        ========================== -->

        <div
        class="chat-messages"
        id="chatMessages">

        </div>

        <!-- =========================
             TYPING INDICATOR
        ========================== -->

        <div
        id="chatTypingIndicator"
        class="chat-typing-indicator"
        style="display:none;">

            Typing...

        </div>

        <!-- =========================
             INPUT AREA
        ========================== -->

        <div class="chat-input-wrapper">

            <!-- FILE INPUT -->

            <input
            type="file"
            id="chatFileInput"
            hidden

            accept="
            image/*,
            video/*,
            audio/*,
            application/pdf,
            application/msword,
            application/vnd.openxmlformats-officedocument.wordprocessingml.document,
            application/vnd.ms-excel,
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,
            application/vnd.ms-powerpoint,
            application/vnd.openxmlformats-officedocument.presentationml.presentation,
            application/zip,
            application/x-zip-compressed,
            application/x-rar-compressed,
            application/vnd.rar,
            text/plain,
            application/json
            ">

            <!-- ATTACH BUTTON -->

            <button
            type="button"
            id="attachChatFile"
            aria-label="Attach File">

                <i data-lucide="paperclip"></i>

            </button>

            <!-- MESSAGE INPUT -->

            <input
            type="text"
            id="chatMessageInput"
            placeholder="Type message..."
            autocomplete="off"
            spellcheck="false">

            <!-- SEND BUTTON -->

            <button
            type="button"
            id="sendChatMessage"
            aria-label="Send Message">

                <i data-lucide="send"></i>

            </button>

        </div>

    </div>

</div>
