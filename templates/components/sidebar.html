<aside
id="appSidebar"
class="app-sidebar">

    <div class="sidebar-inner">

        <a
        href="{{ url_for('dashboard.overview') }}"
        class="sidebar-logo">

            <div class="sidebar-logo-icon">

                <img
                src="{{ url_for('static', filename='logo.png') }}"
                alt="Logo">

            </div>

            <div class="sidebar-logo-text">

                <span>
                    Workspace
                </span>

                <strong>
                    Dashboard
                </strong>

            </div>

        </a>

        <nav class="sidebar-nav">

            <a
            href="{{ url_for('dashboard.overview') }}"
            class="sidebar-link {% if active_page == 'overview' %}active{% endif %}">

                <span class="sidebar-icon">
                    ◈
                </span>

                <span>
                    Overview
                </span>

            </a>

            <a
            href="{{ url_for('dashboard.revenue') }}"
            class="sidebar-link {% if active_page == 'revenue' %}active{% endif %}">

                <span class="sidebar-icon">
                    ◎
                </span>

                <span>
                    Revenue
                </span>

            </a>

            <a
            href="{{ url_for('dashboard.analytics') }}"
            class="sidebar-link {% if active_page == 'analytics' %}active{% endif %}">

                <span class="sidebar-icon">
                    ◉
                </span>

                <span>
                    Analytics
                </span>

            </a>

            <a
            href="{{ url_for('dashboard.workspace') }}"
            class="sidebar-link {% if active_page == 'workspace' %}active{% endif %}">

                <span class="sidebar-icon">
                    ◆
                </span>

                <span>
                    Workspace
                </span>

            </a>

            {% if current_user.is_authenticated
            and current_user.role
            and current_user.role.name == "Admin" %}

            <a
            href="{{ url_for('admin.team') }}"
            class="sidebar-link {% if active_page == 'team' %}active{% endif %}">

                <span class="sidebar-icon">
                    ◉
                </span>

                <span>
                    My Team
                </span>

            </a>

            {% endif %}

        </nav>

    </div>

</aside>

<div
id="sidebarOverlay"
class="sidebar-overlay">
</div>
